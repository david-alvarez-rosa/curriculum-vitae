name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release CV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: david-alvarez-rosa-cv.tex
          latexmk_use_xelatex: false

      - name: Generate release notes
        run: |
          current="${GITHUB_REF_NAME}"
          previous="$(git describe --tags --abbrev=0 "${current}^" 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [ -n "${previous}" ]; then
              echo "Commits since ${previous}:"
              echo
              git log --no-merges --pretty='- %s (%h)' "${previous}..${current}"
            else
              echo "Initial release."
              echo
              git log --no-merges --pretty='- %s (%h)' "${current}"
            fi
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: david-alvarez-rosa-cv.pdf
